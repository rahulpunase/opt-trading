version: "3.9"

services:

  trader:
    build: .
    container_name: kite_trader
    restart: unless-stopped
    env_file: .env
    environment:
      DEBUG: "1"
      SCRAPER_URL: "http://scraper:8080"
    command: ["uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    ports:
      - "8000:8000"
      - "5678:5678"
    volumes:
      - ./logs:/app/logs
      - ./trades:/app/trades
      - ./strategies:/app/strategies
      - ./api:/app/api
      - ./core:/app/core
      - ./data:/app/data
    depends_on:
      redis:
        condition: service_healthy
      scraper:
        condition: service_healthy
    networks:
      - trader_net

  scraper:
    build: ./scraper
    container_name: kite_scraper
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "5679:5679"
    volumes:
      - ./scraper:/app
    command: ["python", "-m", "debugpy", "--listen", "0.0.0.0:5679", "-m", "uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8080", "--reload"]
    networks:
      - trader_net

  frontend:
    image: node:20-alpine
    container_name: kite_frontend
    restart: unless-stopped
    working_dir: /app
    command: sh -c "npm ci && npm run dev"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - trader
    networks:
      - trader_net

  dashboard:
    build: .
    container_name: kite_dashboard
    restart: unless-stopped
    env_file: .env
    command: ["streamlit", "run", "dashboard/app.py",
              "--server.port=8501", "--server.address=0.0.0.0"]
    ports:
      - "8501:8501"
    volumes:
      - ./trades:/app/trades
    depends_on:
      - trader
    networks:
      - trader_net

  redis:
    image: redis:7-alpine
    container_name: kite_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - trader_net

volumes:
  redis_data:

networks:
  trader_net:
    driver: bridge
